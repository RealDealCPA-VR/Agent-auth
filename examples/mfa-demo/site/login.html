<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IRS e-Services (mock) — Sign in</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; max-width: 420px; margin: 4rem auto; }
      input { width: 100%; padding: 0.5rem; margin: 0.25rem 0 1rem; }
      button { padding: 0.5rem 1rem; }
    </style>
  </head>
  <body>
    <h1>IRS e-Services <small>(mock)</small></h1>
    <p>Sign in to access account transcripts.</p>
    <!-- A correct submit advances to the MFA challenge page. This is a static
         mock — any credentials are accepted; the point is the flow. -->
    <form id="login" onsubmit="event.preventDefault(); location.href = 'mfa.html';">
      <label for="username">User ID</label>
      <input id="username" name="username" autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" />
      <button id="submit" type="submit">Sign in</button>
    </form>
  </body>
</html>
