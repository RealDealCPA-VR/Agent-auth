services:
  db:
    image: postgres:16-alpine
    container_name: agentauth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentauth
      POSTGRES_PASSWORD: agentauth
      POSTGRES_DB: agentauth
    ports:
      - '5433:5432'
    volumes:
      - agentauth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agentauth -d agentauth']
      interval: 5s
      timeout: 3s
      retries: 10

  # The full app. `docker compose up` builds it, waits for the db, applies
  # migrations, then serves on http://localhost:8080. Requires a .env with
  # MASTER_KEY and JWT_SECRET (see .env.example).
  app:
    build: .
    container_name: agentauth-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Talk to the db over the compose network (overrides any .env DATABASE_URL).
      DATABASE_URL: postgres://agentauth:agentauth@db:5432/agentauth
      DATABASE_SSL: disable
      HOST: 0.0.0.0
      PORT: '8080'
    command: ['sh', '-c', 'node dist/db/migrate.js && node dist/index.js']
    ports:
      - '8080:8080'

volumes:
  agentauth_pgdata:
